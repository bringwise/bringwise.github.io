<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#e8b96b" fill-opacity="0.05"/>
  <!-- Vertical center axis -->
  <line x1="100" y1="28" x2="100" y2="172" stroke="#e8b96b" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Balance beam -->
  <line x1="40" y1="80" x2="160" y2="80" stroke="#e8b96b" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan (higher = winner) -->
  <line x1="55" y1="80" x2="55" y2="108" stroke="#e8b96b" stroke-opacity="0.45" stroke-width="1.5"/>
  <ellipse cx="55" cy="112" rx="20" ry="5" fill="none" stroke="#e8b96b" stroke-opacity="0.55" stroke-width="1.5"/>
  <!-- Right pan (lower = losing) -->
  <line x1="145" y1="80" x2="145" y2="126" stroke="#e8b96b" stroke-opacity="0.3" stroke-width="1.5"/>
  <ellipse cx="145" cy="130" rx="20" ry="5" fill="none" stroke="#e8b96b" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Pivot circle -->
  <circle cx="100" cy="80" r="5" fill="#e8b96b" fill-opacity="0.7"/>
  <!-- Upward arrow top -->
  <line x1="100" y1="28" x2="100" y2="58" stroke="#e8b96b" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round"/>
  <polyline points="88,40 100,28 112,40" fill="none" stroke="#e8b96b" stroke-opacity="0.7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
