<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#b4a0d4" fill-opacity="0.05"/>
  <!-- Mirror axis -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#b4a0d4" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Left reflection (solid) -->
  <circle cx="70" cy="100" r="46" fill="none" stroke="#b4a0d4" stroke-opacity="0.55" stroke-width="1.5"/>
  <circle cx="70" cy="100" r="26" fill="#b4a0d4" fill-opacity="0.08" stroke="#b4a0d4" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="70" cy="100" r="8"  fill="#b4a0d4" fill-opacity="0.6"/>
  <!-- Right reflection (faded / mirror image) -->
  <circle cx="130" cy="100" r="46" fill="none" stroke="#b4a0d4" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6 3"/>
  <circle cx="130" cy="100" r="26" fill="none" stroke="#b4a0d4" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="130" cy="100" r="8"  fill="#b4a0d4" fill-opacity="0.25"/>
</svg>
