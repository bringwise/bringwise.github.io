<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#d4748c" fill-opacity="0.05"/>
  <!-- Outer pulse ring -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="#d4748c" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Wave path — sine wave across center -->
  <path d="M 20,100
    C 35,70  50,70  65,100
    C 80,130 95,130 110,100
    C 125,70 140,70 155,100
    C 165,122 175,115 180,100"
    fill="none" stroke="#d4748c" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glow center dot -->
  <circle cx="100" cy="100" r="5" fill="#d4748c"/>
  <!-- Small orbit rings -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#d4748c" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#d4748c" stroke-opacity="0.1" stroke-width="1"/>
</svg>
