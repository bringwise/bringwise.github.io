<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#8fa0d4" fill-opacity="0.05"/>
  <!-- Left circle -->
  <circle cx="76" cy="100" r="52"
    fill="#8fa0d4" fill-opacity="0.06"
    stroke="#8fa0d4" stroke-opacity="0.55" stroke-width="2"/>
  <!-- Right circle -->
  <circle cx="124" cy="100" r="52"
    fill="#8fa0d4" fill-opacity="0.06"
    stroke="#8fa0d4" stroke-opacity="0.55" stroke-width="2"/>
  <!-- Intersection fill (overlap) -->
  <path d="M 100,51.5 A 52,52 0 0 1 100,148.5 A 52,52 0 0 1 100,51.5 Z"
    fill="#8fa0d4" fill-opacity="0.14"/>
  <!-- Center dot in intersection -->
  <circle cx="100" cy="100" r="5" fill="#8fa0d4"/>
  <!-- Left center dot -->
  <circle cx="76" cy="100" r="3" fill="#8fa0d4" fill-opacity="0.5"/>
  <!-- Right center dot -->
  <circle cx="124" cy="100" r="3" fill="#8fa0d4" fill-opacity="0.5"/>
</svg>
