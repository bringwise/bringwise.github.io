<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#8fbbaa" fill-opacity="0.05"/>
  <!-- Head -->
  <circle cx="100" cy="52" r="18" fill="none" stroke="#8fbbaa" stroke-opacity="0.7" stroke-width="2"/>
  <!-- Spine / torso -->
  <line x1="100" y1="70" x2="100" y2="128" stroke="#8fbbaa" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <!-- Shoulders -->
  <line x1="60" y1="86" x2="140" y2="86" stroke="#8fbbaa" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="60" y1="86" x2="42" y2="118" stroke="#8fbbaa" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm (raised — gesture) -->
  <line x1="140" y1="86" x2="162" y2="60" stroke="#8fbbaa" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round"/>
  <!-- Hips -->
  <line x1="74" y1="128" x2="126" y2="128" stroke="#8fbbaa" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="74" y1="128" x2="62" y2="170" stroke="#8fbbaa" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="126" y1="128" x2="138" y2="170" stroke="#8fbbaa" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
  <!-- Signal lines from raised hand -->
  <line x1="168" y1="52" x2="178" y2="44" stroke="#8fbbaa" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="172" y1="60" x2="184" y2="57" stroke="#8fbbaa" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
</svg>
