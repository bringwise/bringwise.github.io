<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#d4b030" fill-opacity="0.05"/>
  <!-- Outer diamond -->
  <polygon points="100,20 172,100 100,180 28,100"
    fill="none" stroke="#d4b030" stroke-opacity="0.55" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="100,50 145,100 100,150 55,100"
    fill="#d4b030" fill-opacity="0.08" stroke="#d4b030" stroke-opacity="0.3" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Core diamond -->
  <polygon points="100,76 122,100 100,124 78,100"
    fill="#d4b030" fill-opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="4" fill="#d4b030"/>
  <!-- Corner marks -->
  <circle cx="100" cy="20"  r="3" fill="#d4b030" fill-opacity="0.6"/>
  <circle cx="172" cy="100" r="3" fill="#d4b030" fill-opacity="0.6"/>
  <circle cx="100" cy="180" r="3" fill="#d4b030" fill-opacity="0.6"/>
  <circle cx="28"  cy="100" r="3" fill="#d4b030" fill-opacity="0.6"/>
</svg>
