<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0e0e0e"/>
  <rect width="200" height="200" rx="32" fill="#d96a5a" fill-opacity="0.05"/>
  <!-- Outer triangle -->
  <polygon points="100,22 178,155 22,155"
    fill="none" stroke="#d96a5a" stroke-opacity="0.5" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner triangle -->
  <polygon points="100,52 152,138 48,138"
    fill="none" stroke="#d96a5a" stroke-opacity="0.25" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Break lines (crack through right side of outer triangle) -->
  <line x1="148" y1="100" x2="158" y2="115" stroke="#0e0e0e" stroke-width="5"/>
  <line x1="148" y1="100" x2="158" y2="115" stroke="#d96a5a" stroke-opacity="0.6" stroke-width="1.5"/>
  <line x1="158" y1="115" x2="166" y2="108" stroke="#d96a5a" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Alert dot -->
  <circle cx="100" cy="125" r="5" fill="#d96a5a" fill-opacity="0.8"/>
  <!-- Alert line (exclamation) -->
  <line x1="100" y1="72" x2="100" y2="108" stroke="#d96a5a" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
</svg>
